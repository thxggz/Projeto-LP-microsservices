server:
  port: 8083

spring:
  application:
    name: petfriends-almoxarifado
  datasource:
    url: jdbc:h2:mem:almoxarifado;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: petfriends-almoxarifado
      auto-offset-reset: earliest

# Observabilidade -> exporta traces para o Zipkin (QUESTÃO 4.3)
management:
  tracing:
    sampling:
      probability: 1.0          # amostra 100% das requisições (ok p/ dev)
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
